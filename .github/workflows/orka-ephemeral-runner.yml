name: Orka Ephemeral Runner Demo

on:
  workflow_dispatch:

jobs:
  spin-up-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration repo
        uses: actions/checkout@v4
        with:
          repository: macstadium/orka-github-actions-integration
          path: orka-integration

      - name: Set up environment
        run: |
          cd orka-integration
          echo "GITHUB_APP_ID=${{ secrets.GITHUB_APP_ID }}" >> .env
          echo "GITHUB_APP_INSTALLATION_ID=${{ secrets.GITHUB_APP_INSTALLATION_ID }}" >> .env
          echo "GITHUB_APP_PRIVATE_KEY=${{ secrets.GITHUB_APP_PRIVATE_KEY }}" >> .env
          echo "GITHUB_URL=https://github.com/pythongork/orka" >> .env
          echo "ORKA_URL=${{ secrets.ORKA_API_URL }}" >> .env
          echo "ORKA_TOKEN=${{ secrets.ORKA_TOKEN }}" >> .env
          echo "ORKA_VM_CONFIG=orka-runner-ephemeral" >> .env
          echo "RUNNERS=[{\"name\":\"orka\"}]" >> .env

      - name: Launch ephemeral runner
        run: |
          cd orka-integration
          go run main.go &
          sleep 30

  run-on-orka:
    needs: spin-up-runner
    runs-on: [self-hosted, orka]
    steps:
      - name: Install Chrome
        run: |
          brew install --cask google-chrome
          open -a "Google Chrome"
          echo "✅ Chrome installed"

      - name: Install VS Code
        run: |
          brew install --cask visual-studio-code
          open -a "Visual Studio Code"
          echo "✅ VS Code installed"

      - name: Display Completion Message
        run: |
          echo "🎉 GitHub Action completed successfully!"
          sleep 10

  tear-down:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete Orka VM
        run: |
          orka3 config set --api-url ${{ secrets.ORKA_API_URL }}
          echo "${{ secrets.ORKA_TOKEN }}" | orka3 login --username ${{ secrets.ORKA_USER }} --password-stdin
          orka3 vm delete --vm-name github-runner-ephemeral --force
