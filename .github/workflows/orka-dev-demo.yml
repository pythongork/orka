name: Orka Dev Tools Showcase

on:
  workflow_dispatch:

jobs:
  setup-vm:
    runs-on: [self-hosted, orka]
    steps:
      - name: Ensure Xcode Command Line Tools Fresh Install
        run: |
          if xcode-select -p &>/dev/null; then
            sudo rm -rf /Library/Developer/CommandLineTools
            echo "🧹 Removed existing Xcode CLT"
          fi
          xcode-select --install || echo "Xcode tools prompt initiated"

      - name: Reinstall Docker Desktop
        run: |
          if [ -d "/Applications/Docker.app" ]; then
            echo "🧽 Uninstalling existing Docker"
            rm -rf /Applications/Docker.app
          fi
          brew install --cask docker
          open -a Docker || echo "ℹ️ Docker launch skipped"
          echo "✅ Docker installed and launched"

      - name: Reinstall Visual Studio Code
        run: |
          if [ -d "/Applications/Visual Studio Code.app" ]; then
            echo "🧽 Uninstalling existing VS Code"
            rm -rf "/Applications/Visual Studio Code.app"
          fi
          brew install --cask visual-studio-code
          open -a "Visual Studio Code"
          echo "✅ VS Code installed and launched"

      - name: Reinstall Google Chrome
        run: |
          if [ -d "/Applications/Google Chrome.app" ]; then
            echo "🧽 Uninstalling existing Chrome"
            rm -rf "/Applications/Google Chrome.app"
          fi
          brew install --cask google-chrome
          open -a "Google Chrome"
          echo "✅ Chrome installed and launched"

      - name: Open Apple.com in Safari
        run: |
          open -a Safari "https://www.apple.com"
          echo "🌐 Safari launched Apple.com"

      - name: GUI Test – Take Screenshot
        run: |
          mkdir -p ~/orka-screenshots
          screencapture ~/orka-screenshots/devtools.png
          echo "📸 Screenshot saved to ~/orka-screenshots/devtools.png"

      - name: Show Screenshot File Info
        run: |
          ls -lh ~/orka-screenshots
