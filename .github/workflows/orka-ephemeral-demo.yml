name: Orka Ephemeral Runner Demo

on:
  workflow_dispatch:

jobs:
  spin-up:
    runs-on: ubuntu-latest
    outputs:
      vm-name: ${{ steps.up.outputs.vm-name }}
    steps:
      - name: Spin up Orka VM
        id: up
        uses: jeff-vincent/orka-actions-up@v1.1.1
        with:
          orkaUser: ${{ secrets.ORKA_USER }}
          orkaPass: ${{ secrets.ORKA_PASS }}
          orkaBaseImage: sequoia-90gb-orka3-arm
          githubPat: ${{ secrets.GH_PAT }}
          vpnUser: ${{ secrets.VPN_USER }}
          vpnPassword: ${{ secrets.VPN_PASSWORD }}
          vpnAddress: ${{ secrets.VPN_ADDRESS }}
          vpnServerCert: ${{ secrets.VPN_SERVER_CERT }}
          vcpuCount: 4
          coreCount: 4

  run-job:
    needs: spin-up
    runs-on: [self-hosted, "${{ needs.spin-up.outputs.vm-name }}"]
    steps:
      - name: Confirm Runner Identity
        run: |
          echo "🏃 Running on Orka VM: $(hostname)"
          sw_vers

      - name: Install and Launch Chrome
        run: |
          brew install --cask google-chrome
          open -a "Google Chrome"
          echo "✅ Chrome installed and launched"

      - name: GUI Screenshot
        run: |
          mkdir -p ~/orka-screenshots
          screencapture -x ~/orka-screenshots/chrome.png
          echo "📸 Screenshot captured"

  tear-down:
    if: always()
    needs: [spin-up, run-job]
    runs-on: ubuntu-latest
    steps:
      - name: Tear down Orka VM
        uses: jeff-vincent/orka-actions-down@v1.1.0
        with:
          orkaUser: ${{ secrets.ORKA_USER }}
          orkaPass: ${{ secrets.ORKA_PASS }}
          githubPat: ${{ secrets.GH_PAT }}
          vpnUser: ${{ secrets.VPN_USER }}
          vpnPassword: ${{ secrets.VPN_PASSWORD }}
          vpnAddress: ${{ secrets.VPN_ADDRESS }}
          vpnServerCert: ${{ secrets.VPN_SERVER_CERT }}
          vmName: ${{ needs.spin-up.outputs.vm-name }}
